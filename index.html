<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE BACKROOMS - Full 3D Unity Version</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      background: #000;
      color: #c8b830;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    }
    .header {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      border: 2px solid #c8b830;
      padding: 8px 24px;
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-align: center;
      z-index: 20;
      pointer-events: none;
      text-shadow: 0 0 10px #c8b830;
    }
    .back-btn {
      position: absolute;
      top: 18px;
      left: 20px;
      padding: 10px 22px;
      background: transparent;
      border: 2px solid #c8b830;
      color: #c8b830;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      z-index: 30;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: #c8b830;
      color: #000;
      box-shadow: 0 0 20px #c8b830;
    }
    .warning {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 10px 30px;
      font-size: 0.85rem;
      border: 1px solid #7a7010;
      color: #e8d840;
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="window.location.href='/'">← BACK TO MENU</button>

  <div class="header">THE BACKROOMS — LEVEL 0</div>

  <!-- Unity Backrooms Game -->
  <iframe 
    src="https://play.unity.com/mg/other/the-backrooms" 
    allow="fullscreen; accelerometer; gyroscope; magnetometer; vr; xr-spatial-tracking;"
    allowfullscreen>
  </iframe>

  <div class="overlay"></div>
  <div class="warning">
    WEAR HEADPHONES • FULLSCREEN RECOMMENDED • MOUSE TO LOOK • WASD TO MOVE
  </div>

</body>
</html>
